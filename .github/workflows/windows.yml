name: Windows Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Windows npm run path
        shell: pwsh
        run: |
          npm run capture
          $capture = Join-Path $env:TEMP 'vibe99-prototype.png'
          if (-not (Test-Path -LiteralPath $capture)) {
            throw "Expected capture output at $capture"
          }

      - name: Build Windows portable package
        run: npm run make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            out/builder/Vibe99-*-windows-portable-*.exe
            out/builder/win-unpacked/**
          if-no-files-found: error
